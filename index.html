  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
  <meta name="apple-mobile-web-app-capable" content="yes">
  <meta name="format-detection" content="telephone=no">

  <link rel="apple-touch-icon" href="book.png">

  <style>
    :root{
      --bg:#f4f6fb;
      --card:#ffffff;
      --line:#d7deea;
      --text:#0f172a;
      --blue1:#5b86f3;
      --blue2:#3567e8;
      --green1:#43c06b;
      --green2:#29a957;
      --red1:#f35a48;
      --red2:#e84533;
      --gray1:#7c8da6;
      --gray2:#677990;
      --orange1:#f6b331;
      --orange2:#ee9b0f;
      --shadow:0 10px 28px rgba(15,23,42,.08);
    }

    *{
      box-sizing:border-box;
      -webkit-tap-highlight-color:transparent;
    }

    html,body{
      margin:0;
      padding:0;
      background:var(--bg);
      color:var(--text);
      font-family:"Yu Gothic","Hiragino Sans","Hiragino Kaku Gothic ProN",sans-serif;
      overflow-x:hidden;
      width:100%;
    }

    body{
      padding:10px;
      overscroll-behavior:none;
      touch-action:manipulation;
    }

    .wrap{
      max-width:920px;
      margin:0 auto;
      overflow:hidden;
    }

    .panel{
      background:var(--card);
      border:1px solid var(--line);
      border-radius:28px;
      box-shadow:var(--shadow);
      padding:14px;
      overflow:hidden;
    }

    .top-grid{
      display:grid;
      grid-template-columns:90px 100px 100px 1fr 1fr;
      gap:10px;
      align-items:end;
      margin-bottom:12px;
    }

    .field label{
      display:block;
      font-size:13px;
      font-weight:800;
      margin:0 0 6px 2px;
    }

    .field input,
    .field select,
    .top-btn,
    .bottom-btn,
    .side-btn,
    .jp-toggle,
    .speaker{
      font-size:16px;
    }

    .field input,
    .field select{
      width:100%;
      height:52px;
      border:1px solid var(--line);
      border-radius:16px;
      background:#fff;
      color:var(--text);
      padding:0 12px;
      outline:none;
    }

    .field input::placeholder{
      color:#94a3b8;
    }

    .flash-field input{
      text-align:center;
    }

    .top-btn{
      width:100%;
      height:56px;
      border:none;
      border-radius:18px;
      color:#fff;
      font-weight:900;
      cursor:pointer;
      touch-action:manipulation;
      min-width:82px;
      font-size:18px;
    }

    .start-btn{
      background:linear-gradient(180deg,var(--red1),var(--red2));
    }

    .resume-btn{
      background:linear-gradient(180deg,var(--blue1),var(--blue2));
    }

    .main-grid{
      display:grid;
      grid-template-columns:74px 1fr 74px;
      gap:10px;
      align-items:stretch;
    }

    .side-btn{
      min-height:52vh;
      border:none;
      border-radius:26px;
      color:#fff;
      font-weight:900;
      cursor:pointer;
      writing-mode:vertical-rl;
      text-orientation:upright;
      letter-spacing:2px;
      display:flex;
      align-items:center;
      justify-content:center;
      touch-action:manipulation;
      font-size:19px;
    }

    .stop-btn{
      background:linear-gradient(180deg,var(--green1),var(--green2));
    }

    .next-btn{
      background:linear-gradient(180deg,var(--blue1),var(--blue2));
    }

    .center-col{
      display:flex;
      flex-direction:column;
      gap:10px;
      min-width:0;
    }

    .card-box{
      position:relative;
      min-height:52vh;
      border:1px solid var(--line);
      border-radius:24px;
      background:#fcfdff;
      display:flex;
      flex-direction:column;
      align-items:center;
      justify-content:center;
      text-align:center;
      padding:20px 18px 78px;
      overflow:hidden;
    }

    .word{
      margin:0 0 14px 0;
      font-weight:900;
      line-height:1.02;
      white-space:nowrap;
      overflow:hidden;
      text-overflow:clip;
      word-break:keep-all;
      overflow-wrap:normal;
      max-width:100%;
      width:100%;
      text-align:center;
      font-size:54px;
      letter-spacing:-0.03em;
    }

    .meaning{
      margin:0;
      font-size:34px;
      line-height:1.25;
      color:#334155;
      word-break:break-word;
    }

    .speaker{
      position:absolute;
      left:14px;
      bottom:14px;
      width:66px;
      height:66px;
      border:none;
      border-radius:999px;
      background:#fff6dd;
      box-shadow:0 4px 12px rgba(0,0,0,.08);
      cursor:pointer;
      display:flex;
      align-items:center;
      justify-content:center;
      touch-action:manipulation;
      font-size:28px;
    }

    .below-card{
      display:grid;
      grid-template-columns:1fr auto;
      gap:10px;
      align-items:start;
    }

    .below-text{
      text-align:center;
      font-size:16px;
      font-weight:800;
      line-height:1.5;
      min-height:52px;
    }

    .jp-toggle{
      width:62px;
      height:62px;
      border:none;
      border-radius:16px;
      background:#d1d5db;
      color:#334155;
      font-weight:900;
      cursor:pointer;
      flex-shrink:0;
      touch-action:manipulation;
      font-size:18px;
    }

    .jp-toggle.active{
      background:linear-gradient(180deg,var(--blue1),var(--blue2));
      color:#fff;
    }

    .bottom-row{
      display:grid;
      grid-template-columns:1fr 1fr 1fr;
      gap:12px;
      margin-top:12px;
    }

    .bottom-btn{
      height:68px;
      border:none;
      border-radius:20px;
      color:#fff;
      font-weight:900;
      cursor:pointer;
      touch-action:manipulation;
      font-size:18px;
    }

    .memory-btn{
      background:linear-gradient(180deg,var(--red1),var(--red2));
    }

    .review-btn{
      background:linear-gradient(180deg,var(--gray1),var(--gray2));
    }

    .back-btn{
      background:linear-gradient(180deg,var(--orange1),var(--orange2));
    }

    @media (max-width: 480px){
      body{
        padding:8px;
      }

      .panel{
        padding:10px;
        border-radius:24px;
      }

      .top-grid{
        grid-template-columns:74px 82px 82px 1fr 1fr;
        gap:8px;
      }

      .field input,
      .field select{
        height:50px;
        border-radius:14px;
        padding:0 10px;
      }

      .top-btn{
        height:58px;
        border-radius:16px;
        min-width:70px;
        font-size:17px;
      }

      .main-grid{
        grid-template-columns:60px 1fr 60px;
        gap:8px;
      }

      .side-btn{
        min-height:46vh;
        border-radius:22px;
        font-size:17px;
      }

      .card-box{
        min-height:46vh;
        border-radius:22px;
        padding:16px 10px 72px;
      }

      .word{
        font-size:22px !important;
      }

      .meaning{
        font-size:24px;
      }

      .speaker{
        width:58px;
        height:58px;
        left:10px;
        bottom:10px;
        font-size:24px;
      }

      .below-text{
        font-size:14px;
        min-height:48px;
      }

      .jp-toggle{
        width:54px;
        height:54px;
        border-radius:14px;
        font-size:16px;
      }

      .bottom-btn{
        height:64px;
        border-radius:18px;
        font-size:17px;
      }
    }

    @media (min-width: 481px) and (max-width: 767px){
      .word{
        font-size:34px;
      }

      .meaning{
        font-size:28px;
      }
    }
  </style>
</head>
<body>
  <div class="wrap">
    <div class="panel">

      <div class="top-grid">
        <div class="field">
          <label for="rank">ランク</label>
          <select id="rank">
            <option value="A">A</option>
            <option value="B">B</option>
            <option value="C">C</option>
            <option value="D">D</option>
            <option value="E">E</option>
          </select>
        </div>

        <div class="field">
          <label for="initial">先頭文字</label>
          <input id="initial" type="text" maxlength="1" placeholder="A">
        </div>

        <div class="field flash-field">
          <label for="sec">フラッシュ秒</label>
          <input id="sec" type="number" value="1.5" step="0.1" min="0">
        </div>

        <button class="top-btn start-btn" id="start">スタート</button>
        <button class="top-btn resume-btn" id="resume">再開</button>
      </div>

      <div class="main-grid">
        <button class="side-btn stop-btn" id="stop">ストップ</button>

        <div class="center-col">
          <div class="card-box">
            <div class="word" id="word">-</div>
            <div class="meaning" id="meaning">-</div>
            <button class="speaker" id="speak" aria-label="聞く">🔈</button>
          </div>

          <div class="below-card">
            <div class="below-text">
              <div id="meta">準備OK</div>
              <div id="memoryCount">記憶カード総数：0枚</div>
            </div>
            <button class="jp-toggle active" id="toggleJP">日本語</button>
          </div>
        </div>

        <button class="side-btn next-btn" id="next">次へ</button>
      </div>

      <div class="bottom-row">
        <button class="bottom-btn memory-btn" id="memory">記憶</button>
        <button class="bottom-btn review-btn" id="review">復習</button>
        <button class="bottom-btn back-btn" id="back">戻る</button>
      </div>

    </div>
  </div>

    let list = [];
    let i = 0;
    let timer = null;
    let memoryList = [];
    let history = [];
    let showJP = true;
    let voices = [];

    const rankEl = document.getElementById("rank");
    const initialEl = document.getElementById("initial");
    const secEl = document.getElementById("sec");

    const startBtn = document.getElementById("start");
    const resumeBtn = document.getElementById("resume");
    const stopBtn = document.getElementById("stop");
    const nextBtn = document.getElementById("next");
    const speakBtn = document.getElementById("speak");

    const memoryBtn = document.getElementById("memory");
    const reviewBtn = document.getElementById("review");
    const backBtn = document.getElementById("back");
    const toggleJPBtn = document.getElementById("toggleJP");

    const wordEl = document.getElementById("word");
    const meanEl = document.getElementById("meaning");
    const metaEl = document.getElementById("meta");
    const memoryCountEl = document.getElementById("memoryCount");
    const cardBoxEl = document.querySelector(".card-box");

    function saveProgress(){
      const data = {
        index: i,
        memory: memoryList,
        rank: rankEl.value,
        initial: initialEl.value,
        showJP: showJP,
        list: list,
        history: history
      };
      localStorage.setItem("oxford_progress", JSON.stringify(data));
    }

    function loadProgress(){
      const saved = localStorage.getItem("oxford_progress");
      if (!saved) return;

      try{
        const data = JSON.parse(saved);

        if (data.rank) rankEl.value = data.rank;
        if (data.initial) initialEl.value = data.initial;
        if (data.showJP !== undefined) showJP = data.showJP;
        if (Array.isArray(data.memory)) memoryList = data.memory;
        if (Array.isArray(data.list)) list = data.list;
        if (Array.isArray(data.history)) history = data.history;
        if (typeof data.index === "number") i = data.index;
      }catch(e){
        console.log("読み込みエラー");
      }
    }

    function updateMemoryCount(){
      memoryCountEl.textContent = "記憶カード総数：" + memoryList.length + "枚";
    }

    function loadVoices(){
      if ("speechSynthesis" in window) {
        voices = speechSynthesis.getVoices();
      }
    }

    function pickVoice(){
      const preferred = [
        "Samantha",
        "Karen",
        "Daniel",
        "Google US English",
        "Google UK English Female",
        "Google UK English Male"
      ];

      for (const name of preferred) {
        const v = voices.find(x => x.name === name);
        if (v) return v;
      }

      return voices.find(v => /^en/i.test(v.lang)) || null;
    }

    function speakCurrent(){
      if (!list.length || !("speechSynthesis" in window)) return;

      const ut = new SpeechSynthesisUtterance(list[i].word);
      const voice = pickVoice();

      if (voice) {
        ut.voice = voice;
        ut.lang = voice.lang || "en-US";
      } else {
        ut.lang = "en-US";
      }

      ut.rate = 0.92;
      speechSynthesis.cancel();
      speechSynthesis.speak(ut);
    }

    function loadList(){
      const rank = rankEl.value;
      const init = initialEl.value.trim().toUpperCase();
      const base = Array.isArray(DATA[rank]) ? DATA[rank] : [];

      list = base.filter(x => {
        const word = String(x.word || "");
        return !init || word.toUpperCase().startsWith(init);
      });

      i = 0;
      history = [];
    }

    function fitWordToOneLine(){
      if (!wordEl || !cardBoxEl) return;

      let size = window.innerWidth <= 480 ? 22 : (window.innerWidth <= 767 ? 34 : 54);
      const minSize = 8;
      const availableWidth = cardBoxEl.clientWidth - 24;

      wordEl.style.fontSize = size + "px";

      while (size > minSize && wordEl.scrollWidth > availableWidth) {
        size -= 1;
        wordEl.style.fontSize = size + "px";
      }
    }

    function show(){
      if (!list.length) {
        if (memoryList.length === 0) {
          wordEl.textContent = "OK！";
          meanEl.textContent = "復習するものがありません";
          metaEl.textContent = "記憶カードがありません";
        } else {
          wordEl.textContent = "なし";
          meanEl.textContent = "対象単語がありません";
          metaEl.textContent = "0件";
        }

        meanEl.style.display = showJP ? "block" : "none";
        toggleJPBtn.classList.toggle("active", showJP);
        updateMemoryCount();
        requestAnimationFrame(fitWordToOneLine);
        saveProgress();
        return;
      }

      wordEl.textContent = list[i].word;
      meanEl.textContent = list[i].meaning;
      meanEl.style.display = showJP ? "block" : "none";
      toggleJPBtn.classList.toggle("active", showJP);

      if (i === list.length - 1) {
        metaEl.textContent = "終了！お疲れ様です";
      } else {
        metaEl.textContent = (i + 1) + " / " + list.length;
      }

      updateMemoryCount();
      requestAnimationFrame(fitWordToOneLine);
      saveProgress();
    }

    function stopFlash(){
      if (timer) {
        clearInterval(timer);
        timer = null;
      }
    }

    function startFlashFromCurrent(){
      stopFlash();

      const sec = parseFloat(secEl.value);
      if (!isFinite(sec) || sec <= 0 || !list.length) return;

      timer = setInterval(() => {
        if (i >= list.length - 1) {
          stopFlash();
          show();
          return;
        }
        history.push(i);
        i++;
        show();
      }, sec * 1000);
    }

    function startStudy(){
      loadList();
      show();
      startFlashFromCurrent();
    }

    function resumeStudy(){
      if (!list.length) {
        startStudy();
        return;
      }
      startFlashFromCurrent();
    }

    function nextWord(){
      stopFlash();

      if (!list.length) {
        loadList();
        show();
        return;
      }

      history.push(i);

      if (i < list.length - 1) {
        i++;
      }

      show();
    }

    function addMemory(){
      if (!list.length) return;

      const item = list[i];
      if (!memoryList.find(x => x.word === item.word && x.meaning === item.meaning)) {
        memoryList.push(item);
      }

      updateMemoryCount();
      saveProgress();
    }

    function reviewWords(){
      stopFlash();

      if (!memoryList.length) {
        list = [];
        show();
        saveProgress();
        return;
      }

      list = [...memoryList];
      i = 0;
      history = [];
      show();
      saveProgress();
    }

    function goBack(){
      stopFlash();

      if (history.length) {
        i = history.pop();
        show();
        saveProgress();
      }
    }

    function toggleJapanese(){
      showJP = !showJP;
      show();
      saveProgress();
    }

    startBtn.addEventListener("click", startStudy);
    resumeBtn.addEventListener("click", resumeStudy);
    stopBtn.addEventListener("click", stopFlash);
    nextBtn.addEventListener("click", nextWord);
    speakBtn.addEventListener("click", speakCurrent);

    memoryBtn.addEventListener("click", addMemory);
    reviewBtn.addEventListener("click", reviewWords);
    backBtn.addEventListener("click", goBack);
    toggleJPBtn.addEventListener("click", toggleJapanese);

    initialEl.addEventListener("input", () => {
      initialEl.value = initialEl.value.replace(/[^a-zA-Z]/g, "").toUpperCase().slice(0, 1);
    });

    if ("speechSynthesis" in window) {
      loadVoices();
      speechSynthesis.onvoiceschanged = loadVoices;
    }

    window.addEventListener("resize", () => {
      requestAnimationFrame(fitWordToOneLine);
    });

    window.addEventListener("load", () => {
      requestAnimationFrame(fitWordToOneLine);
    });

    loadProgress();

    if (!list.length) {
      loadList();
    }

    show();
    updateMemoryCount();
  </script>
