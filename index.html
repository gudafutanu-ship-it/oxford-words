<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
<title>Oxford5000</title>
<style>
body{
  font-family:sans-serif;
  background:#f4f6fb;
  margin:0;
  padding:10px;
}
.panel{
  background:#fff;
  border-radius:20px;
  padding:12px;
  max-width:900px;
  margin:auto;
  box-sizing:border-box;
}
.top{
  display:grid;
  grid-template-columns:80px 110px minmax(0,1fr);
  gap:10px;
  align-items:end;
}
label{
  display:block;
  font-weight:bold;
  margin-bottom:4px;
}
input,select{
  height:45px;
  border-radius:12px;
  border:1px solid #ccc;
  padding:0 10px;
  font-size:16px;
  width:100%;
  box-sizing:border-box;
}
.flash{
  display:grid;
  grid-template-columns:72px 34px minmax(110px, 1fr);
  gap:8px;
  align-items:center;
}
.flash input{
  text-align:center;
  padding:0 6px;
}
.flash span{
  font-size:16px;
  font-weight:bold;
  white-space:nowrap;
}
.start{
  background:#e74c3c;
  color:#fff;
  border:none;
  border-radius:12px;
  height:52px;
  padding:0 20px;
  font-weight:bold;
  font-size:18px;
  cursor:pointer;
  width:100%;
}
.study{
  display:grid;
  grid-template-columns:60px 1fr 60px;
  gap:8px;
  margin-top:12px;
}
.side{
  writing-mode:vertical-rl;
  text-orientation:upright;
  border:none;
  border-radius:20px;
  color:#fff;
  font-weight:bold;
  font-size:18px;
  cursor:pointer;
}
.next{background:#4f7df3}
.stop{background:#2ecc71}
.card{
  border:1px solid #ccc;
  border-radius:16px;
  min-height:300px;
  display:flex;
  flex-direction:column;
  justify-content:center;
  align-items:center;
  position:relative;
  background:#fff;
  text-align:center;
  padding:20px 14px 70px;
  box-sizing:border-box;
}
.word{
  font-size:50px;
  font-weight:bold;
  line-height:1.05;
  word-break:break-word;
}
.mean{
  font-size:24px;
  color:#334155;
  margin-top:10px;
  word-break:break-word;
}
.spk{
  position:absolute;
  left:10px;
  bottom:10px;
  border-radius:50%;
  width:50px;
  height:50px;
  border:none;
  font-size:24px;
  cursor:pointer;
  background:#fff7e8;
}
.meta{
  margin-top:8px;
  text-align:center;
  font-weight:bold;
}
.bottom{
  display:grid;
  grid-template-columns:1fr 1fr 1fr;
  gap:8px;
  margin-top:12px;
}
.bottom button{
  height:55px;
  border:none;
  border-radius:16px;
  color:#fff;
  font-size:16px;
  font-weight:bold;
  cursor:pointer;
}
#memory{background:#e74c3c;}
#review{background:#34495e;}
#back{background:#f39c12;}

@media (max-width:640px){
  .top{
    grid-template-columns:78px 98px minmax(0,1fr);
    gap:8px;
  }
  .flash{
    grid-template-columns:60px 26px minmax(96px, 1fr);
    gap:6px;
  }
  .start{
    height:50px;
    font-size:17px;
    padding:0 14px;
  }
  .card{
    min-height:250px;
  }
  .word{
    font-size:42px;
  }
  .mean{
    font-size:22px;
  }
}
</style>
</head>
<body>
<div class="panel">

  <div class="top">
    <div>
      <label for="rank">ランク</label>
      <select id="rank">
        <option>A</option>
        <option>B</option>
        <option>C</option>
        <option>D</option>
        <option>E</option>
      </select>
    </div>

    <div>
      <label for="initial">先頭文字</label>
      <input id="initial" placeholder="A" maxlength="1">
    </div>

    <div>
      <label for="sec">フラッシュ時間</label>
      <div class="flash">
        <input id="sec" type="number" value="1.5" step="0.1" min="0">
        <span>秒</span>
        <button class="start" id="start">スタート</button>
      </div>
    </div>
  </div>

  <div class="study">
    <button class="side next" id="next">次へ</button>

    <div>
      <div class="card">
        <div id="word" class="word">-</div>
        <div id="mean" class="mean">-</div>
        <button class="spk" id="speak">🔈</button>
      </div>
      <div class="meta" id="meta">準備OK</div>
      <div class="meta" id="memoryCount">記憶カード総数：0枚</div>
    </div>

    <button class="side stop" id="stop">ストップ</button>
  </div>

  <div class="bottom">
    <button id="memory">記憶</button>
    <button id="review">復習</button>
    <button id="back">戻る</button>
  </div>

</div>

<script>
/*
  ここに単語データを入れてください
  例:
  const DATA = {
    A: [{ word: "apple", meaning: "りんご" }],
    B: [],
    C: [],
    D: [],
    E: []
  };
*/
const DATA = {
  A: [],
  B: [],
  C: [],
  D: [],
  E: []
};

let list = [];
let i = 0;
let timer = null;
let memoryList = [];
let history = [];
let voices = [];

const rankEl = document.getElementById("rank");
const initialEl = document.getElementById("initial");
const secEl = document.getElementById("sec");
const startBtn = document.getElementById("start");
const nextBtn = document.getElementById("next");
const stopBtn = document.getElementById("stop");
const speakBtn = document.getElementById("speak");

const memoryBtn = document.getElementById("memory");
const reviewBtn = document.getElementById("review");
const backBtn = document.getElementById("back");

const wordEl = document.getElementById("word");
const meanEl = document.getElementById("mean");
const metaEl = document.getElementById("meta");
const memoryCountEl = document.getElementById("memoryCount");

function updateMemoryCount(){
  memoryCountEl.textContent = "記憶カード総数：" + memoryList.length + "枚";
}

function loadVoices(){
  if ("speechSynthesis" in window) {
    voices = speechSynthesis.getVoices();
  }
}

if ("speechSynthesis" in window) {
  loadVoices();
  speechSynthesis.onvoiceschanged = loadVoices;
}

function pickVoice(){
  const preferred = [
    "Samantha",
    "Karen",
    "Daniel",
    "Google US English",
    "Google UK English Female",
    "Google UK English Male"
  ];

  for (const name of preferred) {
    const v = voices.find(x => x.name === name);
    if (v) return v;
  }

  return voices.find(v => /^en/i.test(v.lang)) || null;
}

function speakCurrent(){
  if (!list.length || !("speechSynthesis" in window)) return;

  const ut = new SpeechSynthesisUtterance(list[i].word);
  const voice = pickVoice();

  if (voice) {
    ut.voice = voice;
    ut.lang = voice.lang || "en-US";
  } else {
    ut.lang = "en-US";
  }

  ut.rate = 0.92;
  speechSynthesis.cancel();
  speechSynthesis.speak(ut);
}

function load(){
  const rank = rankEl.value;
  const init = initialEl.value.trim().toUpperCase();

  const base = Array.isArray(DATA[rank]) ? DATA[rank] : [];

  list = base.filter(x => {
    const word = String(x.word || "");
    return !init || word.toUpperCase().startsWith(init);
  });

  i = 0;
}

function show(){
  if (!list.length) {
    if (memoryList.length === 0) {
      wordEl.textContent = "OK！";
      meanEl.textContent = "記憶カードがありません";
      metaEl.textContent = "復習するものがありません";
    } else {
      wordEl.textContent = "なし";
      meanEl.textContent = "対象単語がありません";
      metaEl.textContent = "0件";
    }

    updateMemoryCount();
    return;
  }

  wordEl.textContent = list[i].word;
  meanEl.textContent = list[i].meaning;
  metaEl.textContent = (i + 1) + " / " + list.length;
  updateMemoryCount();
}

function stopFlash(){
  if (timer) {
    clearInterval(timer);
    timer = null;
  }
}

function startStudy(){
  stopFlash();
  load();
  show();

  const sec = parseFloat(secEl.value);
  if (!isFinite(sec) || sec <= 0 || !list.length) return;

  timer = setInterval(() => {
    if (i >= list.length - 1) {
      stopFlash();
      return;
    }
    history.push(i);
    i++;
    show();
  }, sec * 1000);
}

function nextWord(){
  stopFlash();

  if (!list.length) {
    load();
    show();
    return;
  }

  history.push(i);

  if (i < list.length - 1) {
    i++;
  }

  show();
}

function addMemory(){
  if (!list.length) return;

  const item = list[i];

  if (!memoryList.find(x => x.word === item.word && x.meaning === item.meaning)) {
    memoryList.push(item);
  }

  updateMemoryCount();
}

function reviewWords(){
  stopFlash();

  if (!memoryList.length) {
    list = [];
    show();
    return;
  }

  list = [...memoryList];
  i = 0;
  show();
}

function goBack(){
  stopFlash();

  if (history.length) {
    i = history.pop();
    show();
  }
}

startBtn.addEventListener("click", startStudy);
nextBtn.addEventListener("click", nextWord);
stopBtn.addEventListener("click", stopFlash);
speakBtn.addEventListener("click", speakCurrent);

memoryBtn.addEventListener("click", addMemory);
reviewBtn.addEventListener("click", reviewWords);
backBtn.addEventListener("click", goBack);

initialEl.addEventListener("input", () => {
  initialEl.value = initialEl.value.replace(/[^a-zA-Z]/g, "").toUpperCase().slice(0, 1);
});

show();
updateMemoryCount();
</script>

</body>
</html>
